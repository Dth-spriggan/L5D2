<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - MidCV</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Đăng ký</h2>

        <input id="username" type="text"
            placeholder="Tên người dùng"
            class="w-full mb-3 px-3 py-2 border rounded">

        <input id="password" type="password"
            placeholder="Mật khẩu"
            class="w-full mb-3 px-3 py-2 border rounded">

        <input id="confirm" type="password"
            placeholder="Xác nhận mật khẩu"
            class="w-full mb-4 px-3 py-2 border rounded">

        <button onclick="register()"
            class="w-full bg-blue-500 text-white py-2 rounded">
            Đăng ký
        </button>

        <a href="index.html"
            class="block text-center mt-4 text-gray-500">
            ← Quay lại trang chủ
        </a>
    </div>

<script>
function register() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (!username || !password) {
        alert("Vui lòng nhập đầy đủ!");
        return;
    }

    if (password !== confirm) {
        alert("Mật khẩu không khớp!");
        return;
    }

    localStorage.setItem("user", username);
    localStorage.setItem("pass", password);

    alert("Đăng ký thành công!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
