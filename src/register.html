<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - MidCV</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-[450px]">

    <h2 class="text-2xl font-bold text-center mb-6">Đăng ký tài khoản</h2>

    <!-- LOẠI TÀI KHOẢN -->
    <div class="mb-4">
        <label class="block font-medium mb-1">Loại tài khoản</label>
        <select id="accountType" onchange="changeType()"
            class="w-full px-3 py-2 border rounded" required>
            <option value="personal">Cá nhân</option>
            <option value="business">Doanh nghiệp</option>
        </select>
    </div>

    <!-- CÁ NHÂN -->
    <div id="personalForm">

        <div class="mb-4">
            <label class="block font-medium mb-1">Họ và tên</label>
            <input id="fullName" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Ngày sinh</label>
            <input id="dob" type="date"
                class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Số điện thoại</label>
            <input id="phone" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Số CCCD</label>
            <input id="cccd" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

    </div>

    <!-- DOANH NGHIỆP -->
    <div id="businessForm" class="hidden">

        <div class="mb-4">
            <label class="block font-medium mb-1">Tên doanh nghiệp</label>
            <input id="companyName" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Mã số thuế</label>
            <input id="taxCode" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-medium mb-1">Địa chỉ</label>
            <input id="address" type="text"
                class="w-full px-3 py-2 border rounded">
        </div>

    </div>

    <!-- MẬT KHẨU -->
    <div class="mb-4">
        <label class="block font-medium mb-1">Mật khẩu</label>
        <input id="password" type="password"
            class="w-full px-3 py-2 border rounded">
    </div>

    <div class="mb-4">
        <label class="block font-medium mb-1">Xác nhận mật khẩu</label>
        <input id="confirmPassword" type="password"
            class="w-full px-3 py-2 border rounded">
    </div>

    <!-- CAPTCHA -->
    <div class="mb-4">
        <label class="block font-medium mb-1">CAPTCHA</label>
        <p id="captchaText" class="font-bold mb-2"></p>
        <input id="captchaInput" type="text"
            class="w-full px-3 py-2 border rounded">
    </div>

    <button onclick="register()"
        class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
        Đăng ký
    </button>

    <a href="index.html"
        class="block text-center mt-4 text-gray-500 hover:text-blue-600">
        ← Quay lại trang chủ
    </a>

</div>

<script>
let num1, num2, result;

function generateCaptcha() {
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    result = num1 + num2;
    document.getElementById("captchaText").innerText =
        num1 + " + " + num2 + " = ?";
}
generateCaptcha();

function changeType() {
    const type = document.getElementById("accountType").value;
    document.getElementById("personalForm").classList.toggle("hidden", type !== "personal");
    document.getElementById("businessForm").classList.toggle("hidden", type !== "business");
}

function register() {
    const type = document.getElementById("accountType").value;
    const pass = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirmPassword").value.trim();
    const captchaInput = document.getElementById("captchaInput").value.trim();

    if (!pass || !confirm) {
        alert("Vui lòng nhập mật khẩu!");
        return;
    }

    if (pass.length < 6) {
        alert("Mật khẩu phải ít nhất 6 ký tự!");
        return;
    }

    if (pass !== confirm) {
        alert("Mật khẩu không khớp!");
        return;
    }

    if (parseInt(captchaInput) !== result) {
        alert("CAPTCHA sai!");
        generateCaptcha();
        return;
    }

    if (type === "personal") {
        const name = fullName.value.trim();
        const dob = document.getElementById("dob").value;
        const phone = document.getElementById("phone").value.trim();
        const cccd = document.getElementById("cccd").value.trim();

        if (!name || !dob || !phone || !cccd) {
            alert("Vui lòng nhập đầy đủ thông tin cá nhân!");
            return;
        }
    } else {
        const company = document.getElementById("companyName").value.trim();
        const tax = document.getElementById("taxCode").value.trim();
        const address = document.getElementById("address").value.trim();

        if (!company || !tax || !address) {
            alert("Vui lòng nhập đầy đủ thông tin doanh nghiệp!");
            return;
        }
    }

    alert("Đăng ký thành công!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
