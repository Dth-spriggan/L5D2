<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MidCV</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html">
                        <img class="h-10 w-auto" src="./assets/logoweb.png" alt="Logo Nhóm">
                    </a>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-blue-600 font-medium hover:text-blue-800">Việc làm</a>
                    <a href="#" class="text-gray-500 hover:text-blue-600">Hồ sơ & CV</a>
                    <a href="#" class="text-gray-500 hover:text-blue-600">Công ty</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <a href="login.html" class="text-blue-600 font-medium">Đăng nhập</a>
                    <a href="register.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-medium transition">Đăng ký</a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900">Chào mừng trở lại!</h2>
                <p class="text-sm text-gray-500 mt-2">Đăng nhập để tiếp tục tìm kiếm việc làm</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <input id="username" type="text" placeholder="Nhập tên người dùng" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <input id="password" type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 shadow-sm focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-600">Nhớ mật khẩu</span>
                    </label>
                    <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-500">Quên mật khẩu?</a>
                </div>

                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-150">
                    Đăng nhập
                </button>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600">
                Chưa có tài khoản? 
                <a href="register.html" class="font-medium text-blue-600 hover:text-blue-500">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <footer class="bg-slate-900 text-gray-300 pt-16 pb-8 mt-auto">
        <div class="text-center py-4">
             <p class="text-sm text-gray-500">© 2026 Dự án Web Programming. All rights reserved</p>
        </div>
    </footer>

    <script>
    // Phần logic đã được sửa lỗi ở Mục 2 bên dưới
    function login() {
        const inputUser = document.getElementById("username").value.trim();
        const inputPass = document.getElementById("password").value;

        // Lấy danh sách users từ LocalStorage (Sửa lại cho khớp với register.html)
        let users = JSON.parse(localStorage.getItem("users")) || [];

        // Tìm xem có user nào khớp username và password không
        const validUser = users.find(u => u.username === inputUser && u.password === inputPass);

        if (validUser) {
            alert("Đăng nhập thành công! Chào mừng " + (validUser.fullName || validUser.companyName));
            // Lưu trạng thái đã đăng nhập
            localStorage.setItem("currentUser", JSON.stringify(validUser));
            window.location.href = "index.html";
        } else {
            alert("Sai tài khoản hoặc mật khẩu!");
        }
    }
    </script>
</body>
</html>
