<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - MidCV</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-[420px]">

    <h2 class="text-2xl font-bold text-center mb-6">Đăng nhập</h2>

    <!-- USERNAME -->
    <div class="mb-4">
        <label class="block font-medium mb-1">Tên đăng nhập</label>
        <input id="username" type="text"
            class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
    </div>

    <!-- PASSWORD -->
    <div class="mb-6">
        <label class="block font-medium mb-1">Mật khẩu</label>
        <input id="password" type="password"
            class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
    </div>

    <!-- LOGIN BUTTON -->
    <button onclick="login()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-medium transition">
        Đăng nhập
    </button>

    <div class="text-center mt-4 text-sm text-gray-500">
        Chưa có tài khoản?
        <a href="register.html" class="text-blue-600 hover:underline">Đăng ký ngay</a>
    </div>

    <a href="index.html"
       class="block text-center mt-4 text-gray-400 hover:text-blue-600 text-sm">
       ← Quay lại trang chủ
    </a>

</div>

<script>
function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    // Lấy danh sách user
    let users = JSON.parse(localStorage.getItem("users")) || [];

    if (users.length === 0) {
        alert("Chưa có tài khoản nào được đăng ký!");
        return;
    }

    // Tìm user
    const foundUser = users.find(user =>
        user.username === username && user.password === password
    );

    if (!foundUser) {
        alert("Sai tên đăng nhập hoặc mật khẩu!");
        return;
    }

    // Lưu trạng thái đăng nhập
    localStorage.setItem("currentUser", JSON.stringify(foundUser));

    alert("Đăng nhập thành công!");

    // Chuyển về trang chủ
    window.location.href = "index.html";
}
</script>

</body>
</html>
