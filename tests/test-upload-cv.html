<!DOCTYPE html>
<html>
<body>
  <h2>CÔNG CỤ TEST UP CV LÊN MÂY (BY TECH LEAD)</h2>
  
  <form action="http://localhost:3000/api/cvs" method="POST" enctype="multipart/form-data">
    
    <label>ID Ứng Viên:</label><br>
    <input type="text" name="candidate_id" value="2"><br><br>

    <label>Tên CV hiển thị:</label><br>
    <input type="text" name="cv_title" value="CV_Test_Bang_HTML"><br><br>

    <label>Chọn file PDF:</label><br>
    <input type="file" name="cv_file" accept=".pdf,.doc,.docx"><br><br>

    <button type="submit">BÓP CÒ BẮN LÊN MÂY 🚀</button>
  </form>
</body>
</html>
